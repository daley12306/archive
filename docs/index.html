<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Archive Source Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="sidebar">
    <h3>Archive</h3>
    <input id="searchBox" type="text" placeholder="Search file...">
    <ul id="fileList"></ul>
  </div>

  <div id="main">
    <div id="topbar">
        <button id="toggleBtn">☰</button>
        <button id="previewBtn">Preview</button>
        <span id="filename">Loading...</span>
    </div>
    <pre id="code"></pre>
    <iframe id="previewFrame"></iframe>
  </div>

  <script src="app.js"></script>
</body>
</html>
